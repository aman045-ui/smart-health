<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SMART HEALTH GUIDANCE SYSTEM</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container"   id="authSection"> <!-- Dynamic content will come here -->
        <div class="login-box"  id="guestView">
            <h2>Welcome Back!</h2>
            <p>Login to your account</p>
            <form id="loginForm">
                <div class="input-group">
                   <input type="email" id="email" placeholder="Email" required>
                </div>
                <div class="input-group">
                   <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="remember-forgot"  >
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <p id="msg" style="color:red;"></p>
            <p class="signup-link">Don't have an account? <a href="/signup.html">Sign Up</a></p>
        </div>
          <!-- AFTER LOGIN -->
    <div id="userView" style="display:none;">
        <div id="profileIcon"></div>
        <button id="logoutBtn">Logout</button>
    </div>
</div>
<script src="database.js"></script>
<script src="auth.js"></script>

<p id="msg" style="color:red;"></p>

<script>
 

// ================= LOGIN =================
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    loginUser(email, password)
    .then(data => {
        alert("Login Successful ✅");

        // ✅ Save session
        localStorage.setItem("session", email);

        // ✅ Show icon immediately
        showUserView(email);
    })
    .catch(err => {
        alert("Wrong Email or Password ❌");
    });
});


// ================= PAGE LOAD =================
window.onload = function(){
    let user = localStorage.getItem("session");

    if(user){
        showUserView(user);
    }
};


// ================= SHOW USER =================
function showUserView(user){

    // hide login form
    document.getElementById("loginForm").style.display = "none";

    // show icon section
    document.getElementById("userView").style.display = "block";

    let firstLetter = user.charAt(0).toUpperCase();

    document.getElementById("profileIcon").innerHTML = `
        <div style="
            width:60px;
            height:60px;
            border-radius:50%;
            background:#4285F4;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:26px;
            font-weight:bold;
            margin:auto;
        ">
            ${firstLetter}
        </div>

        <p style="text-align:center; margin-top:10px;">${user}</p>
    `;
}


// ================= LOGOUT =================
document.getElementById("logoutBtn").addEventListener("click", function(){
    localStorage.removeItem("session");
    location.reload();
});
</script>
</body>
</html>
