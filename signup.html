<!DOCTYPE html>
 <html lang="en">
   <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Sign Up | SMART HEALTH GUIDANCE SYSTEM</title>
            <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
            <link rel="stylesheet" href="signup.css">
    </head>
        <body>
            <div class="signup-container"  id="authSection"> <!-- Dynamic content will come here -->
                <div class="signup-box" >
                    <h2>Create Your Account</h2>
                    <p>Join SMART HEALTH GUIDANCE SYSTEM for a healthier life</p>
                    <form  id="signupForm">
                        <div class="input-group">
                            <input type="text" id="fullname" placeholder="Full Name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="password" placeholder="Password" required>
                        </div>
                        <div class="input-group">
                            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                        </div>
                        <div >
                        
                        <div class="terms" >
                            <label><input type="checkbox" required> I agree to the <a href="#">Terms & Conditions</a></label>
                        </div>
                        <button type="submit" class="signup-btn">Sign Up</button>
                    </form>
                    
                    <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
                </div>
                <!-- AFTER LOGIN -->
                <div id="userView" style="display:none;">
                <div id="profileIcon"></div>
                <button id="logoutBtn">Logout</button>
            </div>
        </div>

            <!-- ✅ Put script at bottom -->
    <script src="auth.js"></script>
    <script src="database.js"></script>

    <script>
   
    // 2. FORM EVENT LISTENER (Validation & Logic)
    document.getElementById("signupForm").addEventListener("submit", function(e) {
        e.preventDefault();

        let fullname = document.getElementById("fullname").value.trim();
        let email = document.getElementById("email").value.trim();
        let password = document.getElementById("password").value.trim();

        let user = document.querySelector("input[type='text']").value;

        // 🔒 Password validation (8+ chars, 1 number, 1 special symbol)
        let pattern = /^(?=.*[!@#$%^&*])(?=.*\d).{8,}$/;

        if (!pattern.test(password)) {
            alert("Password must be 8 characters with number & special symbol ❌");
            return;
        }

        // 🚀 Call the function that hits your Oracle APEX URL
    signupUser(fullname, email, password)
            .then(data => {

                console.log("API Response:", data); // 🔍 debug

                if (data.result === 0) {
                    alert("Email already exists ❌");
                }else if(data.result === 1){
                    alert("Password already exists-- ❌");
                } else {
                    alert("Signup Successful ✅");

                    localStorage.setItem("session", user);
                    window.location.href = "index.html";
                }
        
            })
            .catch(err => {
                console.error("Signup Error:", err);
                alert("Error connecting to database ❌");
        });
      });
      
    </script>
  </body>
</html>
