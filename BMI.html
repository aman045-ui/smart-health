<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Calculator</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #dff9fb, #c7ecee);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* BIG CONTAINER */
.container {
    width: 500px;              /* 🔥 increased size */
    padding: 40px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

/* TITLE */
h2 {
    font-size: 28px;
    margin-bottom: 20px;
}

/* INPUT FIELDS */
input {
    width: 90%;
    padding: 15px;            /* 🔥 bigger input */
    margin: 15px 0;
    font-size: 18px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: linear-gradient(45deg, #27ae60, #2ecc71);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* BUTTON HOVER */
button:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

/* RESULT */
#result {
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
}

/* ADVICE */
#tip {
    margin-top: 10px;
    font-size: 16px;
    color: #555;
}

/* EXTRA FEATURE BOX */
.extra {
    margin-top: 20px;
    padding: 15px;
    background: #f1f2f6;
    border-radius: 10px;
    font-size: 14px;
}

</style>
</head>

<body>

<div class="container">

    <h2>BMI Calculator</h2>

    <input type="number" id="height" placeholder="Enter height (cm)">
    <input type="number" id="weight" placeholder="Enter weight (kg)">

    <button onclick="calculateBMI()">Calculate BMI</button>

    <div id="result"></div>
    <div id="tip"></div>

    <!-- EXTRA FEATURE -->
    <div class="extra">
        💡 Tip: Maintain balanced diet + regular exercise for best health.
    </div>

</div>

<script>

function calculateBMI() {

    let h = document.getElementById("height").value;
    let w = document.getElementById("weight").value;

    if (!h || !w) {
        document.getElementById("result").innerHTML = "❌ Enter valid values";
        return;
    }

    let height = h / 100;
    let bmi = (w / (height * height)).toFixed(2);

    let category = "";
    let advice = "";

    if (bmi < 18.5) {
        category = "Underweight";
        advice = "🥗 Eat more nutritious food & consult a doctor.";
    } 
    else if (bmi < 24.9) {
        category = "Normal";
        advice = "✅ Great! Maintain your healthy lifestyle.";
    } 
    else if (bmi < 29.9) {
        category = "Overweight";
        advice = "🏃 Exercise regularly & control diet.";
    } 
    else {
        category = "Obese";
        advice = "🚨 Consult a doctor and follow a strict plan.";
    }

    document.getElementById("result").innerHTML =
        `Your BMI: ${bmi} (${category})`;

    document.getElementById("tip").innerHTML = advice;
}

</script>

</body>
</html>
